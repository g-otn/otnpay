name: DB Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'libs/db-schema/src/**'
      - 'libs/db-schema/config/**'

permissions:
  contents: write

jobs:
  migrate:
    name: Generate & Run Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate migrations
        working-directory: libs/db-schema
        run: bun run generate

      - name: Commit generated migrations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add libs/db-schema/migrations/
          if git diff --staged --quiet; then
            echo "No new migrations to commit"
          else
            git commit -m "chore(db-schema): generate migrations [skip ci]"
            git push
          fi

      - name: Run auth migrations
        working-directory: libs/db-schema
        env:
          AUTH_SERVICE_MIGRATION_DB_URL: ${{ secrets.AUTH_SERVICE_MIGRATION_DB_URL }}
        run: bun run migrate:auth

      - name: Run account migrations
        working-directory: libs/db-schema
        env:
          ACCOUNT_SERVICE_MIGRATION_DB_URL: ${{ secrets.ACCOUNT_SERVICE_MIGRATION_DB_URL }}
        run: bun run migrate:account
