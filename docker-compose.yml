name: otnpay-dev-local

# ──────────────────────────────────────────────────────────────────────────────
# Reusable fragments
# ──────────────────────────────────────────────────────────────────────────────

x-postgres: &postgres
  image: postgres:18
  restart: unless-stopped
  environment:
    POSTGRES_USER: dev_admin
    POSTGRES_PASSWORD: dev_password
    POSTGRES_DB: dev_local
  healthcheck:
    test: ['CMD-SHELL', 'pg_isready -U dev_admin -d dev_local']
    interval: 3s
    timeout: 3s
  deploy:
    resources:
      limits:
        memory: 512m
        cpus: '1.0'

x-pgdog: &pgdog
  image: ghcr.io/pgdogdev/pgdog:main
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 128m
        cpus: '0.25'

x-worker: &worker
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./apps/service-auth/.env.dev_docker:/data/apps/service-auth/.env.dev_docker
    - ./apps/service-auth/wrangler.jsonc:/data/apps/service-auth/wrangler.jsonc
    - ./apps/service-auth/src:/data/apps/service-auth/src
  deploy:
    resources:
      limits:
        # 256MiB for wrangler dev mode (not prod) + 128MiB worker memory limit
        memory: 384m
        cpus: '0.5'

x-users-toml: &users-toml |
  [[users]]
  name = "dev_admin"
  database = "dev_local"
  password = "dev_password"

# ──────────────────────────────────────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────────────────────────────────────

services:
  # -- auth microservice --

  auth-db:
    <<: *postgres
    container_name: auth-db
    profiles: [auth]
    ports:
      - '9000:5432'
    volumes:
      - auth_postgres_data:/var/lib/postgresql
    networks:
      - auth-network

  auth-db-pgdog:
    <<: *pgdog
    container_name: auth-db-pgdog
    profiles: [auth]
    configs:
      - source: auth_pgdog_toml
        target: /pgdog/pgdog.toml
      - source: users_auth_toml
        target: /pgdog/users.toml
    ports:
      - '9001:6432'
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - auth-network

  auth-db-migrate:
    image: oven/bun:1.3.9-slim
    container_name: auth-db-migrate
    profiles: [auth]
    working_dir: /app
    volumes:
      - ./libs/db-schema:/app
    environment:
      AUTH_SERVICE_MIGRATION_DB_URL: 'postgres://dev_admin:dev_password@auth-db:5432/dev_local'
    command: sh -c "bun install && bun run migrate:auth"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - auth-network
    restart: no

  auth-redis:
    image: redis
    container_name: auth-redis
    profiles: [auth]
    ports:
      - '9002:6379'
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  auth-redis-proxy:
    image: hiett/serverless-redis-http:latest
    container_name: auth-redis-proxy
    profiles: [auth]
    ports:
      - '9003:80'
    environment:
      SRH_MODE: env
      SRH_TOKEN: dev_auth_redis_proxy_token
      SRH_CONNECTION_STRING: 'redis://auth-redis:6379'
    depends_on:
      - auth-redis
    networks:
      - auth-network
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.1'

  auth-service:
    <<: *worker
    container_name: auth-service
    profiles: [auth]
    ports:
      - '9010:9010'
    environment:
      AUTH_SERVICE_REDIS_URL: 'http://auth-redis-proxy'
      AUTH_SERVICE_REDIS_TOKEN: 'dev_auth_redis_proxy_token'
    depends_on:
      auth-db-migrate:
        condition: service_completed_successfully
      auth-db-pgdog:
        condition: service_started
      auth-redis-proxy:
        condition: service_started
    networks:
      - auth-network

  # -- account microservice --

  account-db:
    <<: *postgres
    container_name: account-db
    profiles: [account]
    ports:
      - '9500:5432'
    volumes:
      - account_postgres_data:/var/lib/postgresql
    networks:
      - account-network

  account-db-pgdog:
    <<: *pgdog
    container_name: account-db-pgdog
    profiles: [account]
    configs:
      - source: account_pgdog_toml
        target: /pgdog/pgdog.toml
      - source: users_account_toml
        target: /pgdog/users.toml
    ports:
      - '9501:6432'
    depends_on:
      account-db:
        condition: service_healthy
    networks:
      - account-network

  account-redis:
    image: redis
    profiles: [account]
    ports:
      - '9502:6379'
    networks:
      - account-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  account-redis-proxy:
    image: hiett/serverless-redis-http:latest
    profiles: [account]
    ports:
      - '9503:80'
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: 'redis://account-redis:6379'
    depends_on:
      - account-redis
    networks:
      - account-network
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.1'

  account-service:
    <<: *worker
    container_name: service-account
    profiles: [account]
    ports:
      - '9510:8787'
    depends_on:
      - account-db-pgdog
      - account-redis-proxy
    networks:
      - account-network

# ──────────────────────────────────────────────────────────────────────────────
# Configs
# ──────────────────────────────────────────────────────────────────────────────

configs:
  auth_pgdog_toml:
    content: |
      [general]
      port = 6432
      default_pool_size = 10
      pooler_mode = "session"
      passthrough_auth = "enabled"

      [[databases]]
      name = "dev_local"
      user = "dev_admin"
      password = "dev_password"
      host = "auth-db"
      port = 5432

  account_pgdog_toml:
    content: |
      [general]
      port = 6432
      default_pool_size = 10
      pooler_mode = "session"
      passthrough_auth = "enabled"

      [[databases]]
      name = "dev_local"
      user = "dev_admin"
      password = "dev_password"
      host = "account-db"
      port = 5432

  users_auth_toml:
    content: *users-toml

  users_account_toml:
    content: *users-toml

# ──────────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────────

networks:
  auth-network:
    name: auth-network
  account-network:
    name: account-network

# ──────────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────────

volumes:
  auth_postgres_data:
  account_postgres_data:
